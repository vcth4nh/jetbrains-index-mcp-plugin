name: Feature request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        #### Thank you for suggesting a feature!

        Before opening a request, please check:
        - [Existing feature requests](https://github.com/hechtcarmel/jetbrains-index-mcp-plugin/issues?q=is%3Aissue+label%3Aenhancement)
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: |
        I often need to ... but the current tools don't support ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see. Include example inputs/outputs if applicable.
      placeholder: |
        A new tool `ide_foo` that accepts { "file": "...", "line": N } and returns ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false
  - type: input
    id: ide-language
    attributes:
      label: IDE / language context
      description: Which IDE or programming language is this relevant to? Leave blank if universal.
      placeholder: "e.g. PyCharm / Python, or All IDEs"
    validations:
      required: false
  - type: checkboxes
    id: required-checks
    attributes:
      label: Please confirm the following
      options:
        - label: I have searched for relevant existing issues before opening this request.
          required: true
        - label: I have updated the title field above with a concise description.
          required: true
